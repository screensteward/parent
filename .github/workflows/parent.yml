name: parent

on:
  push:
    branches: [main, phase1]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

jobs:
  flutter:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.7'
          cache: true

      - name: apt deps (Linux desktop toolchain)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev

      - name: pub get
        run: flutter pub get

      - name: codegen (freezed + json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: verify generated files are up to date
        run: |
          if ! git diff --exit-code -- 'lib/**/*.freezed.dart' 'lib/**/*.g.dart'; then
            echo "::error::Generated files are stale. Run 'dart run build_runner build --delete-conflicting-outputs' and commit the result."
            exit 1
          fi

      - name: analyze
        run: flutter analyze

      - name: test
        run: flutter test

      - name: build linux (debug)
        run: flutter build linux --debug

      - name: build linux (release)
        run: flutter build linux --release
